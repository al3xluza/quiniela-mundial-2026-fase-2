<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 — Fase 2</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{background:#0E2B20;color:#EFF5F0;font-family:Inter,sans-serif;max-width:920px;margin:0 auto;padding:20px}
h1{text-align:center;margin:20px 0;font-family:Saira Condensed;font-size:2.5em}
button{background:#22A565;color:#06291A;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600;margin:10px 5px;font-size:15px}
.boardcard{background:#0A1F17;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;margin:20px 0}
.boardhead{display:grid;grid-template-columns:40px 1fr 70px;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);font-weight:600;font-size:14px;text-transform:uppercase}
.rowp{display:grid;grid-template-columns:40px 1fr 70px;gap:8px;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.rowp.top3{color:#F2C14E;font-weight:700}
.status{text-align:center;padding:20px;color:#ccc;min-height:24px;font-size:14px}
</style>
</head>
<body>
<h1>Quiniela Mundial 2026 — Fase 2</h1>
<div style="text-align:center">
  <button onclick="cargarPredicciones()">◉ ACTUALIZAR PREDICCIONES</button>
</div>
<div id="status" class="status">Cargando predicciones...</div>
<div id="tabla"></div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyBG7rODG-uPsOdYwYj94uz0QI2GItJgI9M5PDu_ajGrFVZR2P0SIpP6wWTys4FhiU/exec';
let PARTICIPANTES=[];

async function cargarPredicciones(){
  const status=document.getElementById('status');
  status.textContent='Leyendo predicciones...';
  try{
    const response=await fetch(APPS_SCRIPT_URL+'?action=getPredicciones');
    const data=await response.json();
    if(data && data.participantes && Array.isArray(data.participantes)){
      PARTICIPANTES=data.participantes;
      PARTICIPANTES.sort((a,b)=>b.puntos-a.puntos);
      actualizarTabla();
      status.textContent='✅ '+PARTICIPANTES.length+' participantes cargados';
    }else{
      throw new Error('Respuesta vacía del Apps Script');
    }
  }catch(error){
    status.textContent='⚠️ Error: '+error.message;
    console.error('Error:', error);
  }
}

function actualizarTabla(){
  const tabla=document.getElementById('tabla');
  let html='<div class="boardcard"><div class="boardhead"><span>POS</span><span>PARTICIPANTE</span><span style="text-align:right;padding-right:10px">PUNTOS</span></div>';
  PARTICIPANTES.forEach((p,idx)=>{
    const cls=idx<3?'top3':'';
    html+='<div class="rowp '+cls+'"><div>'+(idx+1)+'</div><div>'+p.nombre+'</div><div style="text-align:right;padding-right:10px">'+p.puntos+'</div></div>';
  });
  html+='</div>';
  tabla.innerHTML=html;
}

document.addEventListener('DOMContentLoaded',()=>{
  cargarPredicciones();
  setInterval(cargarPredicciones,30000);
});
</script>
</body>
</html>
